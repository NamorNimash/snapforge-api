version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: snapforge-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - STORAGE_PATH=/data
      - RENDER_TIMEOUT=30
      - MAX_CONCURRENT=2
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
